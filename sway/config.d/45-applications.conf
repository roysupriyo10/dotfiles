# Window rules for webapp floating windows
# Make certain applications always float and set their size

# Social media - smaller floating windows
# for_window [title="^Twitter —.*"] floating enable, resize set 400 600, move position center
# for_window [title="^Discord —.*"] floating enable, resize set 800 600, move position center  
# for_window [title="^WhatsApp —.*"] floating enable, resize set 600 800, move position center

# Productivity - medium windows
# for_window [title="^Notion —.*"] floating enable, resize set 1000 700, move position center
# for_window [title="^Google Calendar —.*"] floating enable, resize set 900 600, move position center
# for_window [title="^Google Keep —.*"] floating enable, resize set 400 500, move position center

# Development - larger windows
# for_window [title="^GitHub —.*"] floating enable, resize set 1200 800, move position center
# for_window [title="^ChatGPT —.*"] floating enable, resize set 1000 700, move position center

# Media - varies by content
# for_window [title="^YouTube —.*"] floating enable, resize set 800 600, move position center
# for_window [title="^Spotify —.*"] floating enable, resize set 900 600, move position center

# Calculator
# for_window [app_id="gnome-calculator"] floating enable, resize set 300 400, move position center

# System monitor
# for_window [title="htop"] floating enable, resize set 800 600, move position center

# Custom application shortcuts (add your own here)
# Example: Launch a specific IDE project
# bindsym $mod+Alt+p exec code ~/Projects/my-project

# Example: Launch a specific terminal session
# bindsym $mod+Alt+z exec $term -e zsh -c "cd ~/Projects && zsh"

# Example: Launch development server
# bindsym $mod+Alt+l exec $term -e "cd ~/Projects/website && npm run dev"
