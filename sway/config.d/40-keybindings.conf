### Keybindings Configuration
# Core keyboard shortcuts

# Terminal and application launchers
bindsym $mod+Return exec $term
bindsym $mod+d exec $menu
bindsym $mod+Shift+d exec $menu_alt
bindsym $mod+e exec $filemanager

# Window management
bindsym $mod+c kill
bindsym $mod+Shift+c exec $scripts_dir/reload-config.sh
bindsym $mod+Shift+e exec swaymsg exit

# Focus movement (vim keys)
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

# Focus movement (arrow keys)
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Window movement (vim keys)
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right

# Window movement (arrow keys)
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Layout control
bindsym $mod+b splith
bindsym $mod+v splitv
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+Shift+q layout toggle split
bindsym $mod+f fullscreen
bindsym $mod+Shift+space floating toggle
bindsym $mod+space focus mode_toggle
bindsym $mod+a focus parent

# Scratchpad
bindsym $mod+Shift+minus move scratchpad
bindsym $mod+minus scratchpad show

# Resize mode
bindsym $mod+r mode "resize"

# Hardware keys
bindsym XF86Sleep exec systemctl suspend
bindsym XF86MonBrightnessUp exec $scripts_dir/smart-brightness.sh up $brightness_step
bindsym XF86MonBrightnessDown exec $scripts_dir/smart-brightness.sh down $brightness_step

# Audio controls
bindsym XF86AudioRaiseVolume exec pamixer -i 5
bindsym XF86AudioLowerVolume exec pamixer -d 5
bindsym $mod+Shift+XF86AudioRaiseVolume exec pamixer -i 20
bindsym $mod+Shift+XF86AudioLowerVolume exec pamixer -d 20
bindsym XF86AudioMute exec pamixer -t
bindsym XF86AudioMicMute exec pamixer -t --source 59

# Screenshots
bindsym $mod+Alt+a exec grim "$screenshots/$(date '+%d-%m-%y_%H-%M-%S').png"
bindsym $mod+Alt+s exec grim -g | wl-copy
bindsym $mod+Shift+a exec grim -g "$(slurp)" "$screenshots/$(date '+%d-%m-%y_%H-%M-%S').png"
bindsym $mod+Shift+s exec grim -g "$(slurp -d)" - | wl-copy

# Output switching
bindsym $mod+Control+Shift+h move workspace to output $external
bindsym $mod+Control+Shift+l move workspace to output $laptop

# Media controls (if media keys exist)
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioPause exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous
