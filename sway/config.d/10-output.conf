### Output Configuration
#
# Resolution, refresh rate, scale, and position are applied at runtime by
# scripts/apply-monitors.sh (startup + Super+Shift+C) so the best mode is
# always selected automatically. Only things that can't fail — backgrounds and
# global options — live here, so displays always light up even before the
# script runs.
#
# Layout knobs (which side the external sits on, laptop scale) live in:
#   config.d/variables.d/03-displays.conf

# Wallpapers (laptop is the internal panel; the external is always on HDMI-A-1).
output eDP-1 bg $wallpapers/$wallpaper_laptop fill
output HDMI-A-1 bg $wallpapers/$wallpaper_external fill

# Variable refresh rate where supported.
output * adaptive_sync on
