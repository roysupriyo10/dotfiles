### Output Configuration
# Display and monitor settings using auto-generated positions

# Laptop display
output $laptop {
    background $wallpapers/$wallpaper_laptop fill
    resolution $laptop_res
    scale $laptop_scale
    position $laptop_pos
}

# External monitor 1
output $external {
    background $wallpapers/$wallpaper_external fill
    resolution $external_res
    scale $external_scale
    position $external_pos
}

# External monitor 2 (if connected)
output $external2 {
    background $wallpapers/$wallpaper_external fill
    resolution $external2_res
    scale $external2_scale
    position $external2_pos
}

# External monitor 3 (if connected)
output $external3 {
    background $wallpapers/$wallpaper_external fill
    resolution $external3_res
    scale $external3_scale
    position $external3_pos
}

# External monitor 4 (if connected)
output $external4 {
    background $wallpapers/$wallpaper_external fill
    resolution $external4_res
    scale $external4_scale
    position $external4_pos
}

# Global output settings
output * adaptive_sync on

# Conditional output management (uncomment as needed)
# Disable laptop screen when lid is closed (clamshell mode)
# bindswitch --reload --locked lid:on output $laptop disable
# bindswitch --reload --locked lid:off output $laptop enable

# Mirror laptop to external (uncomment if needed)
# output $external {
#     background $wallpapers/$wallpaper_external fill
#     resolution $external_res
#     scale $external_scale
#     position 0,0
#     mirror $laptop
# }

# Power management for displays
# output $laptop power off
# output $external power on

# Note: Positions are auto-calculated based on grid layout in 03-displays.conf
# To change monitor arrangement:
# 1. Edit config.d/variables.d/03-displays.conf
# 2. Modify $active_monitor_config
# 3. Reload Sway (Super+Shift+C)
#
# Available outputs: swaymsg -t get_outputs
