### Autostart Configuration
# Applications and services to start automatically

# Monitor layout: select best mode + apply left/right layout for all outputs.
# Re-applied on demand via Super+Shift+C (scripts/reload-config.sh).
exec $scripts_dir/apply-monitors.sh

# Essential system services
exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Notification daemon
exec mako

# Network manager applet (for system tray)
# exec nm-applet --indicator

# Audio control (for system tray)
# exec pavucontrol --tab=3

# Clipboard manager
# exec wl-paste -t text --watch clipman store
# exec wl-paste -p -t text --watch clipman store -P --histpath="~/.local/share/clipman-primary.json"

# OLED-safe idle: blank panels, keep the system awake (see scripts/display-power.sh).
exec swayidle -w \
    timeout 300 '$scripts_dir/display-power.sh off' \
    resume '$scripts_dir/display-power.sh on' \
    after-resume '$scripts_dir/display-power.sh on' \
    before-sleep '$scripts_dir/display-power.sh off'

# Auto-mounting of USB drives
# exec udiskie --tray

# Blue light filter
# exec wlsunset -S 06:00 -s 22:00

# Wallpaper manager (if using dynamic wallpapers)
# exec_always ~/.config/sway/scripts/wallpaper.sh

# Startup applications
# exec $browser
# exec $term
# exec discord
# exec spotify

# Auto-hide cursor
exec_always pkill -f "hide_cursor" || true
# exec hide_cursor 5000

# XDG autostart applications
exec dex --autostart --environment sway

# Workspace-specific autostart
# exec swaymsg 'workspace 1; exec $term'
# exec swaymsg 'workspace 2; exec $browser'

# Custom scripts
# exec_always ~/.config/sway/scripts/startup.sh

# Gaming-related (uncomment if needed)
# exec gamemoded
# exec steam -silent

# Development tools (uncomment if needed)
# exec code
# exec insomnia

# Media/Creative tools (uncomment if needed)
# exec obs --startreplaybuffer --minimize-to-tray

# Backup and sync (uncomment if needed)
# exec rclone mount gdrive: ~/GoogleDrive --daemon
# exec syncthing -no-browser

# Status bar extras (if not using built-in status)
# exec_always killall waybar; waybar
# exec_always pkill i3status-rust; i3status-rust ~/.config/i3status-rust/config.toml

# System monitoring (uncomment if needed)
# exec_always pkill conky; conky

# Custom keybinding remapping (if needed)
# exec_always pkill xcape; xcape -e 'Control_L=Escape'

# systemd/dbus env + sway-session.target: /etc/sway/config.d/50-systemd-user.conf
# sway-lid.service: enable with `systemctl --user enable sway-lid.service`
