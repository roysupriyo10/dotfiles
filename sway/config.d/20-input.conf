### Input Configuration
# Settings for keyboard, mouse, and touchpad devices

# Mouse behavior
mouse_warping none
focus_follows_mouse always
focus_on_window_activation smart

# Floating modifier (hold to move/resize floating windows)
floating_modifier $mod normal

# Default keyboard settings (applies to all keyboards)
input type:keyboard {
    repeat_rate 25
    repeat_delay 200
    xkb_layout "us"
    # xkb_variant "dvorak"  # Uncomment for dvorak layout
    # xkb_options "caps:escape"  # Uncomment to map caps to escape
}

# Default touchpad settings (applies to all touchpads)
input type:touchpad {
    dwt enabled                # Disable while typing
    tap enabled                # Tap to click
    natural_scroll enabled     # Natural scrolling direction
    middle_emulation enabled   # Three-finger tap for middle click
    scroll_method two_finger   # Two-finger scrolling
    scroll_factor 1            # Scrolling speed multiplier
    tap_button_map lrm         # 1/2/3 finger tap = left/right/middle
}

# Default pointer settings (applies to all mice)
input type:pointer {
    accel_profile flat         # Disable mouse acceleration
    pointer_accel 0            # Mouse sensitivity (-1 to 1)
    # scroll_factor 1          # Scroll speed multiplier
}

# Device-specific overrides (uncomment and modify as needed)
# Find your device identifiers with: swaymsg -t get_inputs

# Example: Specific touchpad configuration
# input "1267:12921:ASUE1307:00_04F3:3279_Touchpad" {
#     tap enabled
#     natural_scroll enabled
# }

# Example: Specific keyboard configuration  
# input "1:1:AT_Translated_Set_2_keyboard" {
#     repeat_delay 250
#     repeat_rate 20
# }

# Example: Gaming mouse with different settings
# input "1133:16461:Logitech_G502" {
#     accel_profile adaptive
#     pointer_accel 0.5
# }

# Tablet/Drawing pad configuration
input type:tablet_tool {
    # map_to_output $laptop    # Map tablet to specific display
}

# You can get the names of your inputs by running: swaymsg -t get_inputs
# Read `man 5 sway-input` for more information about this section