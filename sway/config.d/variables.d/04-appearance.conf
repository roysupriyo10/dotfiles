### Appearance Variables
# Fonts, borders, gaps, and visual settings

# Font configuration
set $font_family IosevkaNF
set $font_style Bold
set $font_size 10
set $bar_font_size 11
# Alternative fonts (uncomment to use)
# set $font_family "JetBrains Mono"
# set $font_family "Fira Code"
# set $font_family "Source Code Pro"
# set $font_family "Hack"

# Full font string (for convenience)
set $font pango:$font_family $font_style $font_size
set $bar_font pango:$font_family $font_style $bar_font_size

# Window gaps
set $gaps_inner 5
set $gaps_outer 5

# Window borders
set $border_size 2
set $floating_border_size 2

# Corner radius (for swayfx)
set $corner_radius 10

# Blur settings (for swayfx)
set $blur_passes 2
set $blur_radius 5

# Shadow settings (for swayfx)
set $shadow_blur_radius 20
set $shadow_color #000000bb

# Opacity
set $window_opacity 0.95
set $terminal_opacity 0.9