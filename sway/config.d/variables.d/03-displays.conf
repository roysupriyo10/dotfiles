### Display Layout Configuration
#
# This is the ONLY file you normally edit for monitors.
#
# Resolution and refresh rate are auto-selected (highest available) at runtime
# by scripts/apply-monitors.sh, so there are no fragile mode strings to keep in
# sync. Every output is anchored at y=0 (top edges aligned); you only choose the
# left-to-right ORDER of the outputs.
#
# After changing anything here, reload with: Super+Shift+C

# Left-to-right order of outputs, by sway output name (see `swaymsg -t get_outputs`).
# The first name is the leftmost monitor. Works for any number of displays:
#   2 monitors -> "HDMI-A-1 eDP-1"   (external on the left, laptop on the right)
#   3 monitors -> "HDMI-A-1 eDP-1 DP-3"   (any of the 6 orderings you like)
# Any connected output NOT listed here is appended on the right automatically,
# and any listed output that isn't connected is simply skipped.
set $monitor_order "eDP-1 HDMI-A-1"

# Per-output scale overrides, space-separated "name=scale" pairs.
# Anything not listed is auto-scaled by resolution: >=1440p -> 1.6, else 1.0.
# The internal panel is HiDPI, so it's pinned here.
set $monitor_scales "eDP-1=2"
