### Display Variables
# Monitor names and display settings

# Display identifiers (run 'swaymsg -t get_outputs' to find yours)
set $laptop eDP-1
set $external HDMI-A-1
set $external2 DP-1
set $external3 DP-2
set $external4 USB-C-1

# Display resolutions
set $laptop_res 2880x1800@90.001Hz
set $external_res 2560x1440@143.991Hz
set $external2_res 1920x1080@60.000Hz
set $external3_res 1920x1080@75.000Hz
set $external4_res 3840x2160@30.000Hz

# Display scaling
set $laptop_scale 1.8
set $external_scale 1
set $external2_scale 1
set $external3_scale 1
set $external4_scale 2

### Monitor Grid Configurations
# Format: "monitor_name:x,y monitor_name:x,y ..."
# Grid coordinates start from 0,0 (top-left)

# Configuration 1: Dual monitor - External left, Laptop right
set $config_dual_ext_left "external:0,0 laptop:1,0"

# Configuration 2: Dual monitor - Laptop left, External right  
set $config_dual_laptop_left "laptop:0,0 external:1,0"

# Configuration 3: Triple monitor - External, Laptop, External2
set $config_triple_horizontal "external:0,0 laptop:1,0 external2:2,0"

# Configuration 4: Vertical stack - External top, Laptop bottom
set $config_vertical_stack "external:0,0 laptop:0,1"

# Configuration 5: L-shaped - External top-left, Laptop bottom-left, External2 top-right
set $config_l_shape "external:0,0 external2:2,0 laptop:0,1"

# Configuration 6: Laptop only (disable all externals)
set $config_laptop_only "laptop:0,0"

# Configuration 7: External only (disable laptop)
set $config_external_only "external:0,0"

# Configuration 8: Complex 4-monitor grid
set $config_quad_grid "external:0,0 external2:1,0 laptop:0,1 external3:1,1"

### Active Configuration Selector
# Change this to switch between configurations
# Available options: $config_dual_ext_left, $config_dual_laptop_left, 
#                   $config_triple_horizontal, $config_vertical_stack,
#                   $config_l_shape, $config_laptop_only, $config_external_only,
#                   $config_quad_grid

set $active_monitor_config $config_dual_ext_left

