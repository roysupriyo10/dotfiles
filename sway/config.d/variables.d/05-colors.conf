### Color Scheme Variables
# Default dark theme colors

# Background and foreground
set $bg_color #111111
set $fg_color #cccccc

# Window state colors
set $focused_bg #cccccc
set $focused_fg #000000
set $inactive_bg #323232
set $inactive_fg #9c9c9c
set $urgent_bg #ff0000
set $urgent_fg #ffffff

# Border and indicator colors
set $border_color #444444
set $indicator_color #2e9ef4
set $child_border_color #285577

# Status bar colors
set $bar_bg #111111
set $bar_fg #cccccc
set $bar_focused_bg #cccccc
set $bar_focused_fg #000000
set $bar_inactive_bg #323232
set $bar_inactive_fg #9c9c9c

