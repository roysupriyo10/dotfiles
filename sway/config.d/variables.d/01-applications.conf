### Application Variables
# Default applications and launchers

# Terminal emulator
set $term kitty
# Alternative terminals (uncomment to use)
# set $term kitty
# set $term foot
# set $term wezterm

# Application launchers
set $menu dmenu_path | wmenu | xargs swaymsg exec --
set $menu_alt wofi --show drun
# Alternative launchers (uncomment to use)
# set $menu rofi -show drun
# set $menu_alt fuzzel

# Web browser
set $browser firefox
# Alternative browsers (uncomment to use)
# set $browser chromium
# set $browser brave
# set $browser qutebrowser

# File manager
set $filemanager nautilus
# Alternative file managers (uncomment to use)
# set $filemanager thunar
# set $filemanager pcmanfm
# set $filemanager ranger

# Text editor
set $editor nvim
# Alternative editors (uncomment to use)
# set $editor vim
# set $editor emacs
# set $editor code

# Image viewer
set $image_viewer imv
# Alternative viewers (uncomment to use)
# set $image_viewer feh
# set $image_viewer sxiv

# Media player
set $media_player mpv
# Alternative players (uncomment to use)
# set $media_player vlc
