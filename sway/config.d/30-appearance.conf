### Appearance Configuration
# Window borders, gaps, and visual settings

# Window border style
# Options: none, pixel [<n>], normal [<n>]
default_border none
default_floating_border none

# To enable borders with custom size (uses variables)
# default_border pixel $border_size
# default_floating_border pixel $floating_border_size

# Titlebar configuration (when using 'normal' borders)
# titlebar_border_thickness $border_size
# titlebar_padding 5 2

# Window gaps (uses variables)
# Uncomment the following lines to enable gaps
# gaps inner $gaps_inner
# gaps outer $gaps_outer
# smart_gaps on
# smart_borders on

# Font for window titles and bar (uses variables)
font $font

# Window colors (uses color variables)
# class                 border           background       text         indicator             child_border
client.focused          $focused_bg      $focused_bg      $focused_fg  $indicator_color      $focused_bg
client.focused_inactive $inactive_bg     $inactive_bg     $inactive_fg $inactive_bg          $inactive_bg
client.unfocused        $inactive_bg     $inactive_bg     $inactive_fg $inactive_bg          $inactive_bg
client.urgent           $urgent_bg       $urgent_bg       $urgent_fg   $urgent_bg            $urgent_bg
client.placeholder      $bg_color        $bg_color        $fg_color    $bg_color             $bg_color
client.background       $bg_color

# Window opacity (uses variables)
# for_window [class=".*"] opacity $window_opacity
# for_window [app_id=".*"] opacity $window_opacity
# for_window [app_id="$term"] opacity $terminal_opacity

# Blur configuration (if using swayfx instead of sway)
# blur enable
# blur_passes $blur_passes
# blur_radius $blur_radius

# Corner radius (if using swayfx)
# corner_radius $corner_radius

# Shadows (if using swayfx)
# shadows enable
# shadow_blur_radius $shadow_blur_radius
# shadow_color $shadow_color