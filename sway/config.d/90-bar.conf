### Status Bar Configuration
# Swaybar settings and appearance (restored to original settings)

bar {
    position top
    
    # Status command (uses variable)
    status_command while $status_script; do sleep 1; done
    
    mode hide
    hidden_state hide

    colors {
        statusline #cccccc
        focused_workspace #cccccc #cccccc #000000
        focused_background #323232
        background #111111
        inactive_workspace #323232 #323232 #9c9c9c
    }

    font pango:IosevkaNF Bold 11
}

# Alternative bar configurations (uncomment to use)

# Waybar configuration (if using waybar instead of swaybar)
# exec_always killall waybar; waybar

