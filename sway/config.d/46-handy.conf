### Handy speech-to-text — PUSH TO TALK (hold to dictate)
# Wayland can't grab Handy's global hotkey, so we drive it with signals via a
# wrapper that also handles the Bluetooth A2DP<->HFP switch deterministically:
#   key press  -> handy-ptt.sh start  (pause media, warm HFP/SCO, then record)
#   key release-> handy-ptt.sh stop   (transcribe, restore A2DP, resume media)
# The wrapper falls back to the built-in mic when no BT headset is connected.
# --no-repeat stops key auto-repeat from re-firing while held.
# NOTE: keep Handy's own "Push To Talk" toggle OFF (the signal toggles record).

# Transcribe (USR2)
bindsym --no-repeat $mod+Shift+v exec ~/dotfiles/sway/scripts/handy-ptt.sh start
bindsym --release   $mod+Shift+v exec ~/dotfiles/sway/scripts/handy-ptt.sh stop

# Transcribe + LLM post-process (USR1)
bindsym --no-repeat $mod+Alt+v exec ~/dotfiles/sway/scripts/handy-ptt.sh start USR1
bindsym --release   $mod+Alt+v exec ~/dotfiles/sway/scripts/handy-ptt.sh stop USR1
