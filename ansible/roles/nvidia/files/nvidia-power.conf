# RTD3 — Runtime D3 power management for Ampere notebooks
# GPU powers off completely (0W) when idle, wakes on demand via prime-run

# 0x03 = default per architecture (fine-grained RTD3 for Ampere notebooks)
options nvidia NVreg_DynamicPowerManagement=0x03

# Modern standby (S0ix) support — required for s2idle suspend
options nvidia NVreg_EnableS0ixPowerManagement=1

# Disable GSP firmware — workaround for Ampere laptop crashes
options nvidia NVreg_EnableGpuFirmware=0

# Preserve VRAM across suspend/resume — prevents blank screen on wake
options nvidia NVreg_PreserveVideoMemoryAllocations=1
