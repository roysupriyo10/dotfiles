# start up commands
after-login-command = []
after-startup-command = [
  # 'exec-and-forget sketchybar'
]
start-at-login = true

# sketchybar integration
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]

# normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# for when accordion mode is enabled
accordion-padding = 20

# defaults
default-root-container-orientation = 'horizontal'
default-root-container-layout = 'tiles'

# background commands
# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# sweets
automatically-unhide-macos-hidden-apps = true

[key-mapping]
  preset = 'qwerty'

[gaps]
  outer.top = 8
  outer.right = 8
  outer.bottom = 8
  outer.left = 8
  inner.horizontal = 8
  inner.vertical = 8

[mode.main.binding]
  alt-slash = 'layout tiles horizontal vertical'
  alt-comma = 'layout accordion horizontal vertical'
  alt-shift-space = 'layout floating tiling'

  cmd-alt-h = []
  cmd-h = []
  cmd-shift-c = ['reload-config', 'mode main']

  # move to service mode
  alt-cmd-shift-semicolon = 'mode service'

  # move workspaces to different monitors
  cmd-ctrl-shift-h = ['move-workspace-to-monitor left']
  cmd-ctrl-shift-l = ['move-workspace-to-monitor right']
  cmd-ctrl-shift-k = ['move-workspace-to-monitor up']
  cmd-ctrl-shift-j = ['move-workspace-to-monitor down']

  # basic window navigation
  alt-h = 'focus left'
  alt-j = 'focus down'
  alt-k = 'focus up'
  alt-l = 'focus right'

  # app shortcuts
  cmd-enter = ['exec-and-forget open -n /System/Volumes/Data/Applications/Ghostty.app']

  # move windows within workspaces
  cmd-shift-h = 'move left'
  cmd-shift-j = 'move down'
  cmd-shift-k = 'move up'
  cmd-shift-l = 'move right'

  # basic monitor navigation
  cmd-ctrl-alt-h = ['focus-monitor left']
  cmd-ctrl-alt-l = ['focus-monitor right']

  # window resizing
  cmd-alt-shift-r = ['mode resize']

  # basic workspace navigation
  cmd-1 = ['workspace 1', 'mode main']
  cmd-2 = ['workspace 2', 'mode main']
  cmd-3 = ['workspace 3', 'mode main']
  cmd-4 = ['workspace 4', 'mode main']
  cmd-5 = ['workspace 5', 'mode main']
  cmd-6 = ['workspace 6', 'mode main']
  cmd-7 = ['workspace 7', 'mode main']
  cmd-8 = ['workspace 8', 'mode main']
  cmd-9 = ['workspace 9', 'mode main']
  cmd-0 = ['workspace 10', 'mode main']
  cmd-alt-1 = ['workspace 11', 'mode main']
  cmd-alt-2 = ['workspace 12', 'mode main']
  cmd-alt-3 = ['workspace 13', 'mode main']
  cmd-alt-4 = ['workspace 14', 'mode main']
  cmd-alt-5 = ['workspace 15', 'mode main']
  cmd-alt-6 = ['workspace 16', 'mode main']
  cmd-alt-7 = ['workspace 17', 'mode main']
  cmd-alt-8 = ['workspace 18', 'mode main']
  cmd-alt-9 = ['workspace 19', 'mode main']
  cmd-alt-0 = ['workspace 20', 'mode main']

  # move windows to workspaces
  cmd-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
  cmd-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
  cmd-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
  cmd-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
  cmd-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
  cmd-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
  cmd-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
  cmd-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
  cmd-shift-9 = ['move-node-to-workspace 9', 'workspace 9']
  cmd-shift-0 = ['move-node-to-workspace 10', 'workspace 10']

  # back and forth between workspaces
  cmd-backtick = 'workspace-back-and-forth'

[mode.service.binding]
  esc = ['mode main']

  j = 'volume down'
  k = 'volume up'
  shift-j = ['volume set 0', 'mode main']

[mode.resize.binding]
  esc = ['mode main']

  h = ['resize smart +10']
  l = ['resize smart -10']

  f = ['fullscreen', 'mode main']
