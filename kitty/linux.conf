# Linux-specific kitty settings (Sway / Arch)

font_size 16

# Compensate for sway's global trackpad scroll_factor 0.25
touch_scroll_multiplier 4.0

# BEGIN_KITTY_FONTS
font_family      family="monospace"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

modify_font cell_width 95%
modify_font cell_height 8px
modify_font baseline 0

resize_debounce_time 0.1 0.5

# new tab/window: same cwd — with kitten ssh, same remote host + directory
map kitty_mod+t launch --type=tab --cwd=current
map kitty_mod+n launch --type=os-window --cwd=current

# image → agent chat in kitty (Cursor CLI / Claude Code). Ctrl+V. GUI → use VNC.
map kitty_mod+alt+v remote_control_script ~/.local/bin/cursor-clip-paste
