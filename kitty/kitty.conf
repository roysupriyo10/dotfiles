# vim:fileencoding=utf-8:foldmethod=marker

cursor_shape block
shell_integration no-cursor

cursor_shape_unfocused hollow
cursor_blink_interval -1

scrollback_lines 100000

cursor_trail 0
cursor_trail_decay 0.1 0.4

background_opacity 0.75
background_blur 32

hide_window_decorations yes

macos_titlebar_color background

macos_option_as_alt both

# clipboard over SSH (nvim OSC 52, kitten clipboard read/write)
clipboard_control write-clipboard write-primary read-clipboard read-primary

# remote_control for cursor-clip-paste (kitty_mod+alt+v)
allow_remote_control yes

# os.conf is a per-platform symlink created by install (-> macos.conf / linux.conf).
# Avoids ${KITTY_OS} env var, which macOS GUI apps don't inherit.
include os.conf
