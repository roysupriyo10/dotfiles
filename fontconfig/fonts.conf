<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

<alias>
  <family>sans-serif</family>
  <prefer>
    <family>IBM Plex Sans</family>
    <family>Noto Color Emoji</family>
    <family>Noto Emoji</family>
  </prefer>
</alias>

<alias>
  <family>serif</family>
  <prefer>
    <family>PT Serif</family>
    <family>Noto Color Emoji</family>
    <family>Noto Emoji</family>
  </prefer>
</alias>

<alias>
  <family>monospace</family>
  <prefer>
    <family>IosevkaTerm Nerd Font Mono</family>
    <!-- <family>IosevkaTermSlab Nerd Font Mono</family> -->
    <!-- <family>RobotoMono Nerd Font Mono</family> -->
    <!-- <family>VictorMono Nerd Font</family> -->
    <!-- <family>ZedMono Nerd Font</family> -->
    <!-- <family>D2CodingLigature Nerd Font Mono</family> -->
    <!-- <family>FantasqueSansM Nerd Font Mono</family> -->
    <!-- <family>FiraCode Nerd Font</family> -->
    <family>Noto Color Emoji</family>
    <family>Noto Emoji</family>
  </prefer>
</alias>

</fontconfig>
