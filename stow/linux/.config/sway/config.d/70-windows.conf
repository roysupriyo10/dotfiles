### Window Rules Configuration
# Window behavior, rules, and focus settings

# Default window rules - force certain applications to float
for_window [window_role="pop-up"] floating enable
for_window [window_role="bubble"] floating enable
for_window [window_role="dialog"] floating enable
for_window [window_type="dialog"] floating enable
for_window [window_role="task_dialog"] floating enable
for_window [window_type="menu"] floating enable
for_window [app_id="floating"] floating enable
for_window [class="floating"] floating enable

# Picture-in-picture
for_window [title="Picture-in-Picture"] floating enable, sticky enable, resize set 400 225

# System applications
for_window [app_id="pavucontrol"] floating enable, resize set 600 400
for_window [app_id="blueman-manager"] floating enable, resize set 600 400
for_window [app_id="nm-connection-editor"] floating enable
for_window [app_id="gnome-calculator"] floating enable, resize set 300 400
for_window [app_id="gnome-calendar"] floating enable, resize set 800 600

# Development tools
for_window [class="GitKraken"] floating enable, resize set 1200 800
for_window [class="Postman"] floating enable, resize set 1000 700
for_window [title="Developer Tools"] floating enable, resize set 800 600

# Media applications
for_window [app_id="mpv"] floating enable
for_window [class="vlc"] floating enable
for_window [app_id="imv"] floating enable

# File managers (when opening specific dialogs)
for_window [title="File Operation Progress"] floating enable
for_window [title="Confirm to replace files"] floating enable

# Gaming
for_window [class="Steam"] floating enable
for_window [class="Lutris"] floating enable
for_window [instance="origin.exe"] floating enable

# Inhibit idle for certain applications
for_window [class="firefox"] inhibit_idle fullscreen
for_window [app_id="mpv"] inhibit_idle focus
for_window [class="vlc"] inhibit_idle focus

# Urgent window handling
for_window [urgent="latest"] focus

# Hide edge borders when there is only one window
hide_edge_borders smart
