### Path Variables
# Directory paths and file locations

# User directories
set $screenshots ~/Pictures/Screenshots
set $wallpapers ~/Pictures/Wallpapers
set $downloads ~/Downloads
set $documents ~/Documents

# Sway config directory (for scripts and assets)
set $sway_config $HOME/.config/sway

# Default wallpaper
set $wallpaper sasuke-uchiha-neon-5120x2880-22582.png

# Script paths
set $scripts_dir $sway_config/scripts
set $status_script $scripts_dir/status.sh
