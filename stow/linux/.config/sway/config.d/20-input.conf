### Input Configuration
# Settings for keyboard, mouse, and touchpad devices

# Mouse behavior
mouse_warping container
focus_follows_mouse always
focus_on_window_activation smart

# Floating modifier (hold to move/resize floating windows)
floating_modifier $mod normal

# Default keyboard settings (applies to all keyboards)
input type:keyboard {
    repeat_rate 25
    repeat_delay 200
    xkb_layout "us"
}

# Default touchpad settings (applies to all touchpads)
input type:touchpad {
    dwt enabled
    tap enabled
    natural_scroll enabled
    middle_emulation enabled
    scroll_method two_finger
    scroll_factor 1
    tap_button_map lrm
}

# Default pointer settings (applies to all mice)
input type:pointer {
    accel_profile flat
    pointer_accel 0
}

# Tablet/Drawing pad configuration
input type:tablet_tool {
    # map_to_output $laptop
}

# You can get the names of your inputs by running: swaymsg -t get_inputs
# Read `man 5 sway-input` for more information about this section
