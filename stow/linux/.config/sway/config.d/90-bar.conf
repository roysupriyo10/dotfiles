### Status Bar Configuration
# Swaybar settings and appearance

bar {
    position top

    # Status command
    status_command while $status_script; do sleep 1; done

    mode hide
    hidden_state hide

    font $bar_font

    colors {
        background $bar_bg
        statusline $bar_fg
        focused_background $bar_inactive_bg
        focused_workspace $bar_focused_bg $bar_focused_bg $bar_focused_fg
        inactive_workspace $bar_inactive_bg $bar_inactive_bg $bar_inactive_fg
    }
}
