# Prefer the internal Digital Microphone (Mic1) as the default capture source.
#
# Why: this ASUS Vivobook (sof-hda-dsp / Realtek ALC256) exposes two mic sources
# under UCM — Mic1 = internal DMIC (the real mic), Mic2 = the 3.5mm combo-jack
# analog mic. SOF doesn't register the HDA jack-detect kcontrols, so UCM can't
# gate the jack mic by plug state, and WirePlumber would sometimes default to the
# (silent, unplugged) analog Mic2 after a reboot — making Handy record 0 samples.
#
# Fix: raise the DMIC's session priority above the analog mic so the default-node
# picker always chooses the working internal mic. Declarative (survives reboots,
# portable) instead of relying on `wpctl set-default` runtime state.
# Node names are specific to this machine; harmlessly no-ops on other hardware.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "alsa_input.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Mic1__source" }
    ]
    actions = {
      update-props = {
        priority.session = 3000
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_input.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Mic2__source" }
    ]
    actions = {
      update-props = {
        priority.session = 100
      }
    }
  }
]
